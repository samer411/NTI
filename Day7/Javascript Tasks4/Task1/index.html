<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task1</title>
    <link rel="stylesheet" href="Task1.css">
</head>
<body>
    <main>
        <h1>Users Control</h1>
        <form>
            <input  type="text" name="username" id="username" placeholder="Enter Name">
            <input type="number" min="18" name="age" id="age" placeholder="Enter Age">
            <input type="text" name="city" id="city" placeholder="Enter City">
            <button class="add_button" type="submit">ADD</button>
            <button class="update_button" type="submit">Update</button>
        </form>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </table>
    </main>
    <script src="Task1.js"></script>
</body>
</html>
