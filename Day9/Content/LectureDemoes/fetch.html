<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       async function getUser(){
              let reponse= await fetch("https://jsonplaceholder.typicode.com/users")
        //    console.log(reponse)

             myres= await reponse.json()
             //console.log(myres)

              myres.forEach(elm => {
                document.body.innerHTML+=elm.name+"<br/>"
              });
            }
             getUser()
    </script>
</body>
</html>
