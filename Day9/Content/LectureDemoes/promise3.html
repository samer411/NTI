    <script>
           function test(){
            return new Promise((resolve,reject)=>{

                 resolve(name)
                else
                reject("Not Valid Name")
            },2000)

        })}

        // .catch((msg)=>{console.log(msg)})

        test().then((msg)=>{console.log(msg)},(msg)=>{console.log(msg)})


           
    </script>
