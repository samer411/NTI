<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container{
            border:2px solid black ;
            width:90%;
            height:650px;
            display: grid;
          /*  grid-template-columns: 300px 200px*/ ;/*fixed unit*/
            /* grid-template-rows: 250px 400px 150px; */
            grid-template-columns: 1fr 1fr 1fr 1fr ;
            gap:5px;

        }
        .item{
            border:2px solid black ;
            padding:25px;

            
        }
        .nav{
            background: magenta; 
            font:bold 20px tahoma;
            /* grid-column: span 4; */
            grid-column: 1/5;
        
        }
        .content{
            background: cyan;
            font:bold 20px tahoma;
            grid-column:1/4 ;
        }
        .aside{background: lightcoral;font:bold 20px tahoma;
         grid-column: 4/5;
        }
        .footer{background: gray;font:bold 20px tahoma;
         grid-column: 1/5;
        }
         /* .comp{background: darkolivegreen;font:bold 20px tahoma;
        grid-column: span 2;
        } */
           
        @media all and (max-width:600px) {
               .nav{
            background: skyblue; 
            font:bold 20px tahoma;
            /* grid-column: span 4; */
            grid-column: 1/5;
        
        }
               .content{
            background: tomato;
            font:bold 20px tahoma;
            grid-column:1/5 ;
        }
        .aside{background: lightsteelblue;font:bold 20px tahoma;
         grid-column: 1/5;
        }
        .footer{background: black;color:white;font:bold 20px tahoma;
         grid-column: 1/5;
        }
            
        }
        



    </style>
</head>
<body>
    <div class="container">
        <nav class="item nav">Header</nav>
        <article class="item content">content</article>
        <aside class="item aside">sideBar</aside>
        <footer class="item footer">copt rights Reserved</footer>
        <!-- <div class="comp item">Compent</div> -->
    </div>
</body>
</html>
